# Default Verification Configuration
policy: "basic" # basic | standard | deep
max_correction_attempts: 1
auto_correct: true # If false, just notify the user of inaccuracies
log_results_to_dashboard: true
model_override: null
auto_verify: false

knowledge_sources:
  use_system_memory: true
  document_paths: []
  enable_web_search: false

# Vector Store Configuration (optional)
# Uncomment and configure to verify claims against a vector database.
# Supported providers: qdrant, chroma, weaviate, milvus, redis, openviking
#
# vector_store:
#   provider: "qdrant"
#   url: "http://localhost:6333"
#   collection: "knowledge"
#   api_key: ""
#   top_k: 5
#   score_threshold: 0.7
